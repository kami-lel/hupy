[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "HUPy"
version = "0.1.0"
description = "Hooks Utility Python: git hook utilities for commit quality enforcement"
readme = "README.md"
dependencies = ["gitpython>=3.1"]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]
include = ["hupy*"]

# FIXME package-data target is superseded — new design needs a packaged
# default .hupy.config.json template alongside thin .git/hooks/ stub
# templates, not full toggle-script *.bash files; see CONTEXT.md's
# Hook Integration Model
[tool.setuptools.package-data]
hupy = ["default-hupy-hooks/*.bash"]
