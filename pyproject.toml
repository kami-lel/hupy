[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "hupy"
version = "0.1.0"
description = "Hooks Utility Python — git hook utilities for commit quality enforcement"
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]
include = ["hupy*"]
